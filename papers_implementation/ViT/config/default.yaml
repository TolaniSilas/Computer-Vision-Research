# ViT default config (An Image Is Worth 16x16 Words)
# Override via CLI or experiment configs.

model:
  image_size: 224
  patch_size: 16
  num_classes: 1000
  dim: 768
  depth: 12
  heads: 12
  mlp_dim: 3072
  dropout: 0.1
  emb_dropout: 0.1

training:
  batch_size: 32
  epochs: 100
  lr: 0.001
  weight_decay: 0.0

data:
  num_workers: 4
